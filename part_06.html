<head>

<title>part_06 - 離線相簿</title>
<meta name="color-scheme" content="light dark" />
<style>
/* =====================================================
   多圖 HTML 畫廊樣式
   ===================================================== */
* { box-sizing: border-box; }
input, select, textarea { max-width: 100%; }

:root {
    --bg: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 50%, #ec4899 100%);
    --card-bg: rgba(255, 255, 255, 0.85);
    --card-border: rgba(255, 255, 255, 0.35);
    --fg: #0f172a;
    --fg-soft: #334155;
    --accent: #7c3aed;
    --accent-2: #0ea5e9;
    --muted: #64748b;
    --radius-2xl: 28px;
    --shadow-2: 0 20px 45px rgba(15, 23, 42, 0.18);
    --sans: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

@media (prefers-color-scheme: dark) {
    :root {
        --card-bg: rgba(13, 18, 30, 0.8);
        --card-border: rgba(255, 255, 255, 0.08);
        --fg: #e5e7eb;
        --fg-soft: #cbd5e1;
        --muted: #94a3b8;
    }
}

html, body {
    margin: 0;
    min-height: 100%;
    font-family: var(--sans);
    background: var(--bg) fixed;
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: clamp(16px, 3vw, 32px);
}

.wrapper {
    width: min(1000px, 96vw);
    display: flex;
    flex-direction: column;
}

.card {
    background: var(--card-bg);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    border-radius: var(--radius-2xl);
    box-shadow: var(--shadow-2);
    overflow: hidden;
    border: 1px solid var(--card-border);
    display: flex;
    flex-direction: column;
    flex: 1;
}

.header {
    padding: clamp(20px, 4vw, 24px);
    border-bottom: 1px solid var(--card-border);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.header h1 {
    margin: 8px 0;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 800;
    word-break: break-all;
}

.meta {
    color: var(--fg-soft);
    line-height: 1.6;
    font-weight: 700;
    font-size: 0.95rem;
}

.viewer {
    width: 100%;
    flex: 1;
    padding: clamp(16px, 4vw, 32px);
    display: flex;
    flex-direction: column;
    gap: 30px;
    background: rgba(0,0,0,0.02);
}
@media (prefers-color-scheme: dark) { .viewer { background: rgba(0,0,0,0.2); } }

/* 單張圖片卡片 */
.gallery-item {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--card-border);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.gallery-item-header {
    padding: 12px 20px;
    background: rgba(0,0,0,0.03);
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    color: var(--fg-soft);
}
@media (prefers-color-scheme: dark) { .gallery-item-header { background: rgba(255,255,255,0.03); } }

.img-counter {
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.85rem;
}
.img-name {
    font-size: 0.9rem;
    word-break: break-all;
}

.gallery-item img {
    width: 100%;
    height: auto;
    max-height: 80vh;
    object-fit: contain;
    display: block;
    background: rgba(0,0,0,0.01);
}

.gallery-item-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--card-border);
    display: flex;
    justify-content: flex-end;
}

.download-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 18px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 800;
    font-size: 0.95rem;
    box-shadow: 0 6px 15px rgba(15, 23, 42, 0.15);
    transition: 0.2s ease;
    white-space: nowrap;
    gap: 8px;
}
.download-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
}

.footer {
    padding: 16px 24px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 700;
    font-size: 0.9rem;
    border-top: 1px solid var(--card-border);
    background: rgba(124, 58, 237, 0.05);
}

.badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    align-self: flex-start;
}

@media (max-width: 640px) {
    .gallery-item-footer { justify-content: center; }
    .download-action { width: 100%; }
}
</style>
